<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="a_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#12082a"/>
    </linearGradient>
    <linearGradient id="a_msg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(234,169,96,0.22)"/>
      <stop offset="100%" stop-color="rgba(183,148,244,0.12)"/>
    </linearGradient>
    <linearGradient id="a_user" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(99,179,237,0.35)"/>
      <stop offset="100%" stop-color="rgba(99,179,237,0.12)"/>
    </linearGradient>
    <linearGradient id="a_send" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAA960"/>
      <stop offset="100%" stop-color="#D48D44"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#a_bg)"/>
  <rect x="0" y="0" width="800" height="600" fill="#7c3aed" opacity="0.03"/>
  <circle cx="400" cy="120" r="180" fill="#EAA960" opacity="0.05"/>

  <!-- Sidebar -->
  <rect x="32" y="40" width="64" height="520" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.07)"/>
  <circle cx="64" cy="88" r="18" fill="url(#a_msg)" stroke="rgba(234,169,96,0.4)"/>
  <text x="64" y="94" text-anchor="middle" fill="#EAA960" font-family="system-ui,sans-serif" font-size="14" font-weight="800">✦</text>
  <rect x="48" y="132" width="32" height="32" rx="10" fill="rgba(255,255,255,0.06)"/>
  <rect x="56" y="142" width="16" height="3" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="56" y="148" width="12" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="48" y="180" width="32" height="32" rx="10" fill="rgba(255,255,255,0.06)"/>
  <rect x="48" y="228" width="32" height="32" rx="10" fill="rgba(255,255,255,0.06)"/>

  <!-- Header -->
  <rect x="116" y="40" width="652" height="52" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
  <text x="140" y="74" fill="rgba(255,255,255,0.9)" font-family="system-ui,sans-serif" font-size="15" font-weight="600" letter-spacing="0.02em">Aura AI</text>
  <rect x="620" y="54" width="120" height="24" rx="8" fill="rgba(15,217,138,0.12)" stroke="rgba(15,217,138,0.35)"/>
  <circle cx="636" cy="66" r="5" fill="#0FD98A"/>
  <text x="648" y="70" fill="rgba(209,250,229,0.95)" font-family="system-ui,sans-serif" font-size="10" font-weight="600">LIVE</text>

  <!-- Chat area -->
  <rect x="116" y="108" width="652" height="432" rx="20" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.06)"/>

  <!-- User message (right) -->
  <rect x="420" y="140" width="320" height="72" rx="14" fill="url(#a_user)" stroke="rgba(99,179,237,0.35)"/>
  <text x="440" y="172" fill="rgba(255,255,255,0.88)" font-family="system-ui,sans-serif" font-size="13">What’s the bias for EURUSD</text>
  <text x="440" y="192" fill="rgba(255,255,255,0.88)" font-family="system-ui,sans-serif" font-size="13">into London open?</text>

  <!-- AI response (left) -->
  <rect x="140" y="236" width="420" height="140" rx="16" fill="url(#a_msg)" stroke="rgba(234,169,96,0.35)"/>
  <rect x="156" y="252" width="48" height="10" rx="3" fill="rgba(234,169,96,0.5)"/>
  <text x="156" y="288" fill="rgba(255,255,255,0.82)" font-family="system-ui,sans-serif" font-size="12">Structure: higher lows on 1H; watch</text>
  <text x="156" y="310" fill="rgba(255,255,255,0.82)" font-family="system-ui,sans-serif" font-size="12">1.0850 as pivot. Risk: USD strength</text>
  <text x="156" y="332" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-size="11">if data surprises. Not financial advice.</text>
  <rect x="156" y="348" width="180" height="6" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="156" y="348" width="120" height="6" rx="2" fill="rgba(234,169,96,0.45)"/>

  <!-- Typing shimmer -->
  <g transform="translate(140, 396)">
    <circle cx="12" cy="8" r="4" fill="#EAA960" opacity="0.9"/>
    <circle cx="28" cy="8" r="4" fill="#EAA960" opacity="0.5"/>
    <circle cx="44" cy="8" r="4" fill="#EAA960" opacity="0.25"/>
  </g>

  <!-- Input bar -->
  <rect x="140" y="480" width="604" height="48" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
  <text x="164" y="510" fill="rgba(255,255,255,0.35)" font-family="system-ui,sans-serif" font-size="13">Ask anything about markets…</text>
  <rect x="684" y="488" width="44" height="32" rx="10" fill="url(#a_send)" opacity="0.95"/>
  <path d="M702 500 L710 508 L702 516" stroke="#0a0618" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
