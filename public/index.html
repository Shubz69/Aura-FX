  <!-- Content Security Policy -->

<body>

<!-- React App Root -->
<div id="root"></div>

<!-- Add a small script to force reload on mobile -->
<script>
  // Force page to reload if it was cached
  window.onload = function() {
    // Check if this is a fresh load or from cache
    if (window.performance && window.performance.navigation.type === 2) {
      window.location.reload(true);
    }
  };
  
  // Log to console to verify new code is running
  console.log('Index loaded with cache busting - ' + new Date().toISOString());
</script>

<!-- React Scripts will be automatically injected here during build -->
</body>
