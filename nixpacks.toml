# Nixpacks config for Railway - full-stack deploy (React + Express)
# Node 18 EOL; use Node 20 LTS. Increase heap to avoid OOM during React build
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"

[variables]
NIXPACKS_NODE_VERSION = "20"
NODE_OPTIONS = "--max-old-space-size=4096"
NODE_ENV = "production"
